name: Daily News Fetch

on:
  schedule:
    - cron: "0 21 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install anthropic

      - name: Fetch articles
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python fetch_news.py

      - name: Commit and push articles.json
        run: |
          git config user.name "M5Paperboy Bot"
          git config user.email "bot@m5paperboy"
          git add docs/articles.json
          git diff --staged --quiet || git commit -m "Daily news update $(date -u +%Y-%m-%d)"
          git push
